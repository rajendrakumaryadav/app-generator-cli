<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}{{ project_name }}{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --border: #e2e8f0;
      --brand: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    header {
      border-bottom: 1px solid var(--border);
      background: #fff;
    }

    .header-inner {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      font-weight: 700;
      color: var(--brand);
      text-decoration: none;
      letter-spacing: 0.2px;
    }

    main {
      min-height: calc(100vh - 64px - 72px);
      display: flex;
      align-items: center;
      padding: 2.5rem 0;
    }

    .card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }

    h1 {
      margin: 0 0 0.75rem;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    footer {
      border-top: 1px solid var(--border);
      background: #fff;
    }

    .footer-inner {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      background: #eff6ff;
      color: #1d4ed8;
      padding: 0.12rem 0.35rem;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  {% include "partials/header.html" %}
  <main>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>
  {% include "partials/footer.html" %}
</body>
</html>
